letter:
  subject: "Bewerbung als Senior Fullstack Developer (m/w/d) - Claude Code Expert"
  greeting: "Sehr geehrte Damen und Herren,"
  paragraphs:
    - >
      die ausgeschriebene Position bei soonami.io spricht mich an, weil sie genau an der
      Stelle ansetzt, an der Software kurz vor dem Launch belastbar werden muss: Feature
      Set finalisieren, Entwicklungsprozesse in einen Betriebsmodus überführen,
      technische Best Practices etablieren und Infrastruktur sowie Roadmap kritisch
      einordnen. Dass LuniNora Beratung und Coaching leichter, fairer und jederzeit
      zugänglich machen möchte, passt zudem gut zu meiner Vorliebe für Produkte mit
      konkretem Nutzen statt Technik um ihrer selbst willen.
    - >
      Ich bringe knapp 30 Jahre Erfahrung als Senior Fullstack-Entwickler mit und habe
      über viele Jahre produktionsnahe Anwendungen in verteilten Teams gebaut und
      modernisiert. Im Lebenslauf finden Sie dazu unter anderem meine fünfjährige Arbeit
      an der Scaled-Agile-Collaborate-Plattform mit TypeScript, Angular, Docker,
      PostgreSQL und AWS, die Migration einer iCombine-Plattform von AngularJS zu React
      sowie aktuelle TypeScript- und Docker-Arbeit bei TXODDS. Diese Projekte zeigen,
      dass ich nicht nur einzelne Tickets umsetze, sondern komplexe Systeme über längere
      Phasen tragfähig weiterentwickle.
    - >
      Besonders nah an Ihrer Rolle ist mein aktueller Schwerpunkt auf angewandter KI und
      Agentic Engineering. In AGYNAMIX Invoicer entwickle ich KI-gestützte Analyse
      eingehender Rechnungen mit strukturierter PDF-Extraktion, Vision-Modellen,
      JSON-Schema-Ausgaben, semantischen Prüfungen, alternativen Kandidaten und
      User-in-the-Loop-Review über lokale und entfernte OpenAI-kompatible Provider. Die
      explizite Nennung von Claude Code verstehe ich daher nicht als isoliertes Tooling,
      sondern als Teil einer Arbeitsweise, in der KI-gestützte Entwicklung sauber in
      Architektur, Review, Tests und Lieferfähigkeit eingebettet sein muss.
    - >
      Für Ihre Backend-Anforderungen bringe ich starke Grundlagen in API-Design,
      HTTP-basierten Systemen, Authentifizierungskonzepten, Datenbanken, Deployment und
      CI/CD-naher Arbeit mit. Meine Erfahrung liegt historisch in JVM-, Rust- und
      Scala-/Lift-Backends sowie modernen Web-Frontends; TypeScript ist über mehrere
      Projekte hinweg fester Bestandteil meiner Arbeit. Firebase/GCP-, Node-/Express-,
      Stripe- oder Twilio-spezifische Details würde ich schnell und pragmatisch in Ihrer
      bestehenden Codebasis vertiefen, ohne dabei die betrieblichen Anforderungen aus dem
      Blick zu verlieren.
    - >
      Ich sehe meinen stärksten Beitrag in der Launch- und Post-Launch-Phase: technische
      Risiken sichtbar machen, saubere Entwicklungs- und Betriebspraktiken etablieren,
      Roadmap-Entscheidungen fachlich und technisch abwägen und gleichzeitig hands-on
      liefern. Genau diese Kombination aus Seniorität, Produktverantwortung,
      Fullstack-Umsetzung und KI-gestützter Arbeitsweise würde ich gern bei soonami.io
      und LuniNora einbringen.
  closing: "Mit freundlichen Grüßen"
  signature: "Torsten Uhlmann"