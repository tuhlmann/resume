# ──────────────────────────────────────────────
# ABOUT (personal background & interests)
# ──────────────────────────────────────────────
about:
  title: "About Me"
  text: >
    I grew up in the beautiful Ore Mountains of Germany, where I still live. I'm married
    to my wife Silvia and we have two kids.

    In eighth grade I was given a programmable BASIC calculator with a memory of 1024 bytes.
    Though very limited, it allowed me to create useful solutions for school and helped
    me reduce my homework. After secondary school I was admitted to study computer science
    at Chemnitz Technical University---remarkable given that in the last year of school,
    in 1988 in East Germany, I was told I would never be allowed to study as a Christian.
    Just a year later the history of our nation completely changed.

    I finished my studies in 1996 and started working for a large IT supplier in
    different projects until 2004, when I started my freelancing career.

  interests:
    - title: "Volunteer Translator"
      description: >
        For many years I have been volunteering as a translator for international guests and events.
    - title: "Coffee Enthusiast"
      description: >
        I'm a coffee aficionado and vastly enjoy a good cup of espresso.
        I wonder if more than a decade of Java programming nurtured this habit.
    - title: "Sourdough Bread Baker"
      description: >
        A few years ago I started my bread baking adventure. After many mishaps 
        we now mill our own flour and bake our own sourdough bread. 
        Apart from being healthier, this process puts my
        feet back on reality---especially when most of the things I work with
        are only virtual.

