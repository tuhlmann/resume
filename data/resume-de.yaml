  summary: >
    Senior Full Stack Software Engineer mit knapp 30 Jahren Erfahrung in der Entwicklung
    robuster, hochperformanter Softwarelösungen für unterschiedlichste Branchen.
    Über AGYNAMIX begleite ich komplexe, systemkritische Anwendungen vom Prototyp bis
