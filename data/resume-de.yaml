    immer stark.

    Ich bin Autor des Buches „Lift Web Applications How-To" (Packt Publishing, 2012) und
    trage regelmäßig zu Open-Source-Projekten auf GitHub bei. Ich bin besonders gut darin,
    mich in Teams zu integrieren und mich tief in die Materie einzuarbeiten.

  location: "Remote"

# ──────────────────────────────────────────────
# ÜBER MICH (Persönliches)
# ──────────────────────────────────────────────
about:
  title: "Über mich"
  text: >
    Ich bin im wunderschönen Erzgebirge aufgewachsen, wo ich noch heute lebe. Ich bin
    mit meiner Frau Silvia verheiratet und wir haben zwei Kinder.

    In der achten Klasse bekam ich einen programmierbaren BASIC-Taschenrechner mit einem
    Speicher von 1024 Byte. Obwohl sehr eingeschränkt, konnte ich damit nützliche
    Lösungen für die Schule erstellen und meine Hausaufgaben reduzieren. Nach der
    erweiterten Oberschule wurde ich zum Informatikstudium an der TU Chemnitz zugelassen
    ---was insofern bemerkenswert war, als man mir im letzten Schuljahr (das war 1988 in
    der DDR) sagte, ich würde als Christ niemals studieren dürfen. Nur ein Jahr später
    hatte sich die Geschichte unseres Landes komplett verändert.

    Ich schloss mein Studium 1996 ab und begann bei einem großen IT-Dienstleister in
    verschiedenen Projekten zu arbeiten, bis ich 2004 meine freiberufliche Karriere
    startete.

  interests:
    - title: "Ehrenamtlicher Übersetzer"
      description: >
        Seit vielen Jahren übersetze ich ehrenamtlich für internationale Gäste
        und Veranstaltungen.
    - title: "Kaffee-Enthusiast"
      description: >
        Ich bin ein Kaffee-Liebhaber und genieße einen guten Espresso sehr.
        Ob wohl mehr als ein Jahrzehnt Java-Programmierung diese Gewohnheit
        gefördert hat?
    - title: "Sauerteig-Brotbäcker"
      description: >
        Vor einigen Jahren habe ich mein Brotback-Abenteuer begonnen.
        Nach vielen Missgeschicken mahlen wir Mehl selbst und backen unser eigenes
        Sauerteig-Brot. Abgesehen davon, dass es gesünder ist, holt mich dieser Prozess
        auf den Boden der Tatsachen zurück---besonders wenn die meisten Dinge,
        mit denen ich arbeite, nur virtuell sind.

